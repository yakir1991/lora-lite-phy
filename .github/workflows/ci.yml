name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang-format-17

      - name: Check formatting
        run: |
          find host_sim/src host_sim/include host_sim/tests examples \
               -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \
            | xargs clang-format-17 --dry-run --Werror

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update -qq
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y -qq g++-13
          else
            sudo apt-get install -y -qq clang-17
          fi
          sudo apt-get install -y -qq ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -j$(nproc) --output-on-failure --timeout 300 -E "tx_soft_sf12"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.compiler }}
          path: build/Testing/Temporary/LastTest.log

  coverage:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq g++-13 ninja-build lcov

      - name: Configure with coverage
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13 -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -j$(nproc) --output-on-failure --timeout 300 -E "tx_soft_sf12"

      - name: Generate coverage report
        run: cmake --build build --target coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.info
          fail_ci_if_error: false
