name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update -qq
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y -qq g++-13
          else
            sudo apt-get install -y -qq clang-17
          fi
          sudo apt-get install -y -qq ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -j$(nproc) --output-on-failure
