name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq g++-13 ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -j$(nproc) --output-on-failure --timeout 300 -E "tx_soft_sf12"

      - name: Package binaries
        run: |
          mkdir -p dist
          cp build/host_sim/lora_tx dist/
          cp build/host_sim/lora_replay dist/
          tar czf lora-lite-phy-${{ github.ref_name }}-linux-x86_64.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: lora-lite-phy-*.tar.gz
